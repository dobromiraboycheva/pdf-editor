version: 2
updates:
  # npm dependencies — weekly security + version updates
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    groups:
      # Group dev-tooling bumps so they don't spam individual PRs
      dev-dependencies:
        dependency-type: 'development'
      # Group the safe, frequently-updated runtime libs
      production-minor-patch:
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'
    labels:
      - 'dependencies'

  # Rust crates (Tauri shell)
  - package-ecosystem: 'cargo'
    directory: '/src-tauri'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'rust'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels:
      - 'ci'
